# XcodeGen manifest — run `xcodegen generate` to produce PlacesApp.xcodeproj.
# This keeps the project text-based and diff-friendly instead of committing a binary .xcodeproj.
name: PlacesApp
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    TARGETED_DEVICE_FAMILY: "1,2"        # iPhone + iPad
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  PlacesApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.PlacesApp
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        # Later modules add permission strings here, e.g.:
        # INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Shows nearby places."
