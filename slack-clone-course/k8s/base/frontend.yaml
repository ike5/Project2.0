# The Next.js frontend. Image built with the prod API/WS URLs baked in (Module 12),
# then loaded into kind: `kind load docker-image slack-frontend:dev --name slack`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: slack
  labels: {app: frontend}
spec:
  replicas: 2
  selector: {matchLabels: {app: frontend}}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  template:
    metadata: {labels: {app: frontend}}
    spec:
      containers:
        - name: frontend
          image: slack-frontend:dev
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 3000}]
          readinessProbe:
            httpGet: {path: /, port: 3000}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits: {cpu: "300m", memory: "384Mi"}
---
apiVersion: v1
kind: Service
metadata: {name: frontend, namespace: slack}
spec:
  selector: {app: frontend}
  ports: [{port: 3000, targetPort: 3000}]
