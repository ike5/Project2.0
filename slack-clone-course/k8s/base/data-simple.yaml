# SIMPLE, single-pod Postgres + Redis for Module 13 — just enough to get the app
# running on Kubernetes. These are NOT highly available. Module 14 replaces them with
# the CloudNativePG operator (HA Postgres) and an HA Redis. MailHog + MinIO are dev aids.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: slack
spec:
  replicas: 1
  selector: {matchLabels: {app: postgres}}
  template:
    metadata: {labels: {app: postgres}}
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - {name: POSTGRES_USER, value: slack}
            - {name: POSTGRES_PASSWORD, value: slack}
            - {name: POSTGRES_DB, value: slack}
          ports: [{containerPort: 5432}]
---
apiVersion: v1
kind: Service
metadata: {name: postgres, namespace: slack}
spec:
  selector: {app: postgres}
  ports: [{port: 5432, targetPort: 5432}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: redis, namespace: slack}
spec:
  replicas: 1
  selector: {matchLabels: {app: redis}}
  template:
    metadata: {labels: {app: redis}}
    spec:
      containers:
        - name: redis
          image: redis:7
          ports: [{containerPort: 6379}]
---
apiVersion: v1
kind: Service
metadata: {name: redis, namespace: slack}
spec:
  selector: {app: redis}
  ports: [{port: 6379, targetPort: 6379}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: mailhog, namespace: slack}
spec:
  replicas: 1
  selector: {matchLabels: {app: mailhog}}
  template:
    metadata: {labels: {app: mailhog}}
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          ports: [{containerPort: 1025}, {containerPort: 8025}]
---
apiVersion: v1
kind: Service
metadata: {name: mailhog, namespace: slack}
spec:
  selector: {app: mailhog}
  ports:
    - {name: smtp, port: 1025, targetPort: 1025}
    - {name: ui, port: 8025, targetPort: 8025}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: minio, namespace: slack}
spec:
  replicas: 1
  selector: {matchLabels: {app: minio}}
  template:
    metadata: {labels: {app: minio}}
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - {name: MINIO_ROOT_USER, value: minioadmin}
            - {name: MINIO_ROOT_PASSWORD, value: minioadmin}
          ports: [{containerPort: 9000}, {containerPort: 9001}]
---
apiVersion: v1
kind: Service
metadata: {name: minio, namespace: slack}
spec:
  selector: {app: minio}
  ports:
    - {name: api, port: 9000, targetPort: 9000}
    - {name: console, port: 9001, targetPort: 9001}
