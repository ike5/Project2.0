# Non-secret configuration shared by web/worker/beat. Mounted as env vars.
# In Module 13 the DB/Redis point at the simple in-cluster services below; Module 14
# repoints DATABASE_URL/REDIS_URL at the HA operator services.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: slack
data:
  DEBUG: "false"
  ALLOWED_HOSTS: "slack.local,web,localhost,127.0.0.1"
  DATABASE_URL: "postgres://slack:slack@postgres:5432/slack"
  REDIS_URL: "redis://redis:6379/0"
  EMAIL_HOST: "mailhog"
  EMAIL_PORT: "1025"
  S3_ENDPOINT_URL: "http://minio:9000"
  FRONTEND_ORIGIN: "http://slack.local"
---
# Secrets: in real clusters these come from a sealed-secret / external secrets manager,
# NEVER committed. This is a template — see secret.example.yaml. Apply your own.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: slack
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-a-real-cluster"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
