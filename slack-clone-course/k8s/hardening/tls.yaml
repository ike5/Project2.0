# TLS via cert-manager (Module 16).
#
# Install cert-manager:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
# A self-signed issuer is used for the local cluster; in production swap to a
# Let's Encrypt ACME issuer (email + HTTP-01 solver via the nginx ingress).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
# An Ingress annotated for cert-manager: it provisions a cert into the named secret
# and serves HTTPS. (Production: issuer "letsencrypt-prod" instead of "selfsigned".)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slack-tls
  namespace: slack
  annotations:
    cert-manager.io/cluster-issuer: "selfsigned"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [slack.local]
      secretName: slack-tls-cert
  rules:
    - host: slack.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: {service: {name: web, port: {number: 8000}}}
          - path: /ws
            pathType: Prefix
            backend: {service: {name: web, port: {number: 8000}}}
          - path: /
            pathType: Prefix
            backend: {service: {name: frontend, port: {number: 3000}}}
