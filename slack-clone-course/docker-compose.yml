# The whole Slack clone, containerized. One command brings up the data services,
# the Django web (ASGI) server, a Celery worker, Celery Beat, and the Next.js frontend.
#
#   docker compose up --build
#
# Then open http://localhost:3000.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: slack
      POSTGRES_PASSWORD: slack
      POSTGRES_DB: slack
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slack"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports: ["8025:8025"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9001:9001"]
    volumes: [miniodata:/data]

  # Shared backend environment (anchor reused by web/worker/beat).
  web:
    build: ./apps/slack-backend
    command: ["web"]
    environment: &backend_env
      DEBUG: "false"
      SECRET_KEY: "compose-dev-change-me"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web"
      DATABASE_URL: "postgres://slack:slack@postgres:5432/slack"
      REDIS_URL: "redis://redis:6379/0"
      EMAIL_HOST: "mailhog"
      EMAIL_PORT: "1025"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      FRONTEND_ORIGIN: "http://localhost:3000"
      RUN_MIGRATIONS: "1"          # web container migrates on boot (compose convenience)
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  worker:
    build: ./apps/slack-backend
    command: ["worker"]
    environment: *backend_env
    depends_on:
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}

  beat:
    build: ./apps/slack-backend
    command: ["beat"]
    environment: *backend_env
    depends_on:
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}

  frontend:
    build:
      context: ./apps/slack-frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
        NEXT_PUBLIC_WS_URL: "ws://localhost:8000"
    ports: ["3000:3000"]
    depends_on: [web]

volumes:
  pgdata:
  miniodata:
