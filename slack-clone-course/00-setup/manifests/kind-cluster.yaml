# A 1-control-plane + 2-worker cluster. Multiple workers let later modules show
# real scheduling, anti-affinity, and node-failure behavior that a single node hides.
# Ports 80/443 are mapped so the Ingress in Module 13 is reachable from your host.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: slack
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
