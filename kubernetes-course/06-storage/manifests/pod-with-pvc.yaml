# A Pod that mounts the 'data' PVC at /data. Anything written there persists even
# after this Pod is deleted, because the data lives in the PVC/PV, not the container.
apiVersion: v1
kind: Pod
metadata:
  name: writer
spec:
  containers:
    - name: shell
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: data
