# Contrast: an emptyDir volume. Data here is DELETED when the Pod is removed.
# Use this to demonstrate ephemeral-vs-persistent in the lab.
apiVersion: v1
kind: Pod
metadata:
  name: ephemeral
spec:
  containers:
    - name: shell
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: scratch
          mountPath: /scratch
  volumes:
    - name: scratch
      emptyDir: {}
