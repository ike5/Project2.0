# A Secret for web-api's API_TOKEN.
# stringData lets you write the plaintext value; Kubernetes base64-encodes it for you.
# REMEMBER: this is base64, NOT encryption. Do not commit real secrets to git.
apiVersion: v1
kind: Secret
metadata:
  name: web-secret
type: Opaque
stringData:
  API_TOKEN: "super-secret-demo-token"
