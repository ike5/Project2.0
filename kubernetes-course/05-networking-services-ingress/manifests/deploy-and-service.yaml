# web Deployment + a ClusterIP Service in front of it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web-api
          image: web-api:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: COLOR
              value: "blue"
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: ClusterIP          # internal-only stable IP + DNS name "web"
  selector:
    app: web               # must match the Pods' labels
  ports:
    - port: 80             # the Service port (what clients call)
      targetPort: 8080     # the container port to forward to
