# A second app ("api") so we can demonstrate path-based Ingress routing.
# Reuses the same web-api image but with a different COLOR so responses differ.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: web-api
          image: web-api:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: COLOR
              value: "green"
            - name: GREETING
              value: "Hello from the API service"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8080
