# DEV overlay: prefix names with "dev-", keep 1 replica, set a dev greeting.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: dev-
resources:
  - ../../base
# Patch the env var without rewriting the whole Deployment:
patches:
  - target:
      kind: Deployment
      name: web-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "lime"
