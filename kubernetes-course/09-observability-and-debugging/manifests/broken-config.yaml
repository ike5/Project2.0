# BROKEN: references a ConfigMap key that doesn't exist -> CreateContainerConfigError.
# Diagnose with: kubectl describe pod broken-config  (Events name the missing ConfigMap)
apiVersion: v1
kind: Pod
metadata:
  name: broken-config
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      env:
        - name: NEEDED
          valueFrom:
            configMapKeyRef:
              name: does-not-exist      # no such ConfigMap
              key: somekey
