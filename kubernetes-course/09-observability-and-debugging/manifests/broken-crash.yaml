# BROKEN: the container exits with an error immediately -> CrashLoopBackOff.
# Diagnose with: kubectl logs broken-crash --previous
apiVersion: v1
kind: Pod
metadata:
  name: broken-crash
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo 'starting up...'; echo 'fatal: config missing' >&2; exit 1"]
