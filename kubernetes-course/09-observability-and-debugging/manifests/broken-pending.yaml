# BROKEN: requests more memory than any node has -> stays Pending (unschedulable).
# Diagnose with: kubectl describe pod broken-pending  (Events: "Insufficient memory")
apiVersion: v1
kind: Pod
metadata:
  name: broken-pending
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          memory: "9000Gi"      # absurd; no node can satisfy this
