# A StatefulSet with a headless Service. Each Pod (web-0, web-1) gets:
#  - a stable name and DNS entry (web-0.web-headless...)
#  - its OWN PersistentVolumeClaim from volumeClaimTemplates (data-web-0, data-web-1)
# We use a simple busybox that writes its identity to its own volume.
apiVersion: v1
kind: Service
metadata:
  name: web-headless
spec:
  clusterIP: None           # headless: DNS returns each Pod's IP, no load-balanced VIP
  selector:
    app: stateful-web
  ports:
    - port: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
spec:
  serviceName: web-headless    # ties the StatefulSet to its headless Service
  replicas: 2
  selector:
    matchLabels:
      app: stateful-web
  template:
    metadata:
      labels:
        app: stateful-web
    spec:
      containers:
        - name: shell
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'echo "I am $(hostname)" > /data/identity.txt; sleep 3600'
          volumeMounts:
            - name: data
              mountPath: /data
  # Each replica gets its own PVC created from this template:
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 256Mi
