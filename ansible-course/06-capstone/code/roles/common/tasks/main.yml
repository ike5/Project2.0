---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - ufw
    state: present
    update_cache: true

- name: Default-deny firewall, allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Enable ufw with default deny incoming
  community.general.ufw:
    state: enabled
    direction: incoming
    policy: deny
