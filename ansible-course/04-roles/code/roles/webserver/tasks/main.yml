---
# The webserver role body. Note template/copy src paths are relative to the role.
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Ensure the web root exists
  ansible.builtin.file:
    path: "{{ web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Render the homepage
  ansible.builtin.template:
    src: index.html.j2                 # -> roles/webserver/templates/index.html.j2
    dest: "{{ web_root }}/index.html"
    mode: "0644"

- name: Render the nginx site config
  ansible.builtin.template:
    src: site.conf.j2
    dest: /etc/nginx/sites-available/site
    mode: "0644"
  notify: Reload nginx

- name: Enable our site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/site
    dest: /etc/nginx/sites-enabled/default
    state: link
    force: true
  notify: Reload nginx

- name: nginx started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
