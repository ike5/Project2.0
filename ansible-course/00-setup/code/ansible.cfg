# Project defaults so you can run `ansible all -m ping` without -i flags.
[defaults]
inventory = ./inventory.ini
remote_user = ubuntu
host_key_checking = False        # lab convenience; leave ON (default) in production
stdout_callback = yaml           # nicer, readable task output
interpreter_python = auto_silent

[privilege_escalation]
become = False                   # turn on per-play/task with `become: true`
